name: Cross-Org Docker Push via PAT

on:
  workflow_dispatch: # Allows you to manually trigger this from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Check out the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Create a dummy Dockerfile dynamically
      - name: Create Dummy Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM alpine:3.19
          RUN echo "Hello from georges-test-org pushing to georges-secret-test-org!" > /hello.txt
          CMD ["cat", "/hello.txt"]
          EOF

      # Step 3: Set up Docker Buildx (for modern OCI image building)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Log in to GHCR using your Cross-Org PAT
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Replace 'your-github-username' with the actual username of the account that created the PAT
          username: georgeorellanaDA
          password: ${{ secrets.CROSS_ORG_SECRET}}

      # Step 5: Build and Push to the destination organization
      - name: Build and Push Dummy Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Notice the path explicitly targets the destination organization
          tags: ghcr.io/georges-secret-test-org/temp/temp/components/dpm:latest