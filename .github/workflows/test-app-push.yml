name: Test Cross-Org GitHub App Push

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
        packages: write
        
    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Generate the GitHub App Token for the Target Organization
      - name: Generate GitHub App Token
        id: get_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: 'georges-secret-test-org' # The target organization

      # Step 3: Dynamically write out a dummy Dockerfile
      - name: Create Dummy Dockerfile
        run: |
          cat <<EOF > Dockerfile
          FROM alpine:3.19
          RUN echo "Hello from a cross-organization build!" > /motd.txt
          CMD ["cat", "/motd.txt"]
          EOF

      # Step 4: Set up Docker Buildx (highly recommended for modern builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Log in to GitHub Container Registry using the App Token
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # 'x-access-token' is the universal standard username when using GitHub App tokens
          username: x-access-token 
          password: ${{ steps.get_token.outputs.token }}

      # Step 6: Build and Attempt to Push the image
      - name: Build and Push Dummy Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Notice the all-lowercase path pointing to the target org
          tags: ghcr.io/georges-secret-test-org/temp/temp/components/dpm:latest